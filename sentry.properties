defaults.url=https://sentry.io/
# Overridden by SENTRY_ORG environment variable (set as EAS secret)
defaults.org=SENTRY_ORG_PLACEHOLDER
# Overridden by SENTRY_PROJECT environment variable (set as EAS secret)
defaults.project=SENTRY_PROJECT_PLACEHOLDER
# Overridden by SENTRY_AUTH_TOKEN environment variable (set as EAS secret)
auth.token=SENTRY_AUTH_TOKEN_PLACEHOLDER
